theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: DrownCoder
tagline: Android / 源码 / 读书 / 生活
description: >-
  记录 Android 开发、源码分析、读书笔记与生活随笔。

url: "https://drowncoder.github.io"
baseurl: ""

github:
  username: DrownCoder

social:
  name: DrownCoder
  email: 2994734692@qq.com
  links:
    - https://github.com/DrownCoder

theme_mode: dark

avatar: https://github.com/DrownCoder.png

toc: true

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - "*.gem"
  - "*.gemspec"
  - inbox
  - tools
  - vendor
  - scripts
  - user-7866586-1775056048.rar
  - README.local.md
