<script async src="https://cdn.jsdelivr.net/gh/sukkaw/busuanzi@2.3.0/bsz.pure.mini.js"></script>

<span id="busuanzi_container_page_pv" hidden>
  <span id="busuanzi_value_page_pv"></span>
</span>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const output = document.getElementById('pageviews');
    const source = document.getElementById('busuanzi_value_page_pv');
    const container = document.getElementById('busuanzi_container_page_pv');

    if (!output || !source || !container) return;

    const syncViews = () => {
      const raw = source.textContent.trim();

      if (raw) {
        output.innerText = new Intl.NumberFormat().format(Number(raw));
        container.hidden = true;
        return true;
      }

      return false;
    };

    if (syncViews()) return;

    let attempts = 0;
    const timer = setInterval(() => {
      attempts += 1;

      if (syncViews() || attempts > 40) {
        clearInterval(timer);
      }
    }, 500);
  });
</script>
