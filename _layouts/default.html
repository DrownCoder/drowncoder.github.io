<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/categories/' | relative_url }}">分类</a>
          <a href="{{ '/about/' | relative_url }}">关于</a>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>{{ site.description }}</p>
        <p>Powered by GitHub Pages and Jekyll</p>
      </footer>
    </div>
  </body>
</html>
